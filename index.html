<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dinner Sorted – Your personal dinner problem solver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background-color: #fff7ed; overscroll-behavior: none; }
    :root { --safe-bottom: env(safe-area-inset-bottom, 0px); }
    .pb-safe { padding-bottom: calc(80px + var(--safe-bottom)); }
    .bottom-nav { padding-bottom: var(--safe-bottom); }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .modal-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    .pulse { animation: pulse 0.3s ease-in-out; }
    input, textarea, select { font-size: 16px !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // ============================================================
    // 1. CONSTANTS
    // ============================================================
    const EXCLUDED_WORDS = [
      'peanut','peanuts','peanut butter','groundnut','groundnuts',
      'shrimp','prawn','prawns','king prawn','king prawns','lobster',
      'crab','crayfish','scallop','scallops','oyster','oysters',
      'mussel','mussels','clam','clams','langoustine','langoustines','crevette',
      'lamb','mutton','rack of lamb','lamb chops','lamb mince','lamb leg','lamb shoulder'
    ];

    const SWEET_CATEGORIES = ['Dessert'];
    const isSavoury = (meal) => !SWEET_CATEGORIES.includes(meal?.strCategory);

    const STAPLES = [
      'salt','pepper','oil','olive oil','vegetable oil','garlic','onion',
      'butter','flour','sugar','water','black pepper','sea salt',
      'sunflower oil','cooking oil','seasoning','mixed herbs','dried herbs',
      'baking powder','bicarbonate of soda','plain flour','self raising flour',
      'white pepper','chilli flakes','bay leaves','bay leaf'
    ];

    const MOOD_TAGS = [
      { label: '🍝 Pasta Night',       type: 'category',   value: 'Pasta' },
      { label: '🍗 Chicken',           type: 'ingredient', value: 'chicken' },
      { label: '🥩 Beef',              type: 'category',   value: 'Beef' },
      { label: '🐟 Fish',              type: 'category',   value: 'Seafood' },
      { label: '🥗 Light Meal',        type: 'name',       value: 'salad' },
      { label: '🇮🇹 Italian',          type: 'area',       value: 'Italian' },
      { label: '🌮 Mexican',           type: 'area',       value: 'Mexican' },
      { label: '🍛 Indian',            type: 'area',       value: 'Indian' },
      { label: '🇨🇳 Chinese',          type: 'area',       value: 'Chinese' },
      { label: '🇯🇵 Japanese',         type: 'area',       value: 'Japanese' },
      { label: '🇹🇭 Thai',             type: 'area',       value: 'Thai' },
      { label: '🫕 Comfort Food',      type: 'name',       value: 'stew' },
      { label: '🎉 Treat Day',         type: 'category',   value: 'Dessert' },
      { label: '🥦 Veggie',            type: 'category',   value: 'Vegetarian' },
      { label: '⚡ Quick & Easy',      type: 'name',       value: 'stir fry' },
      { label: '🍳 Brekkie for Dinner',type: 'category',   value: 'Breakfast' },
      { label: '🥓 Pork',             type: 'category',   value: 'Pork' },
      { label: '🍔 American',          type: 'area',       value: 'American' },
    ];

    // ============================================================
    // 2. STORAGE
    // ============================================================
    const KEYS = {
      pantry:        'dinner_pantry',
      favourites:    'dinner_favourites',
      ratings:       'dinner_ratings',
      bookmarks:     'dinner_bookmarks',
      recentlyEaten: 'dinner_recently_eaten',
      shoppingList:  'dinner_shopping_list',
    };

    const load = (key, fallback) => {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    };

    const save = (key, value) => {
      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
    };

    // ============================================================
    // 3. API
    // ============================================================
    const API = 'https://www.themealdb.com/api/json/v1/1';

    const apiFetch = async (url) => {
      const res = await fetch(url);
      if (!res.ok) throw new Error('API error');
      return res.json();
    };

    const searchByName = (q) => apiFetch(`${API}/search.php?s=${encodeURIComponent(q)}`);
    const filterByCategory = (c) => apiFetch(`${API}/filter.php?c=${encodeURIComponent(c)}`);
    const filterByArea = (a) => apiFetch(`${API}/filter.php?a=${encodeURIComponent(a)}`);
    const filterByIngredient = (i) => apiFetch(`${API}/filter.php?i=${encodeURIComponent(i)}`);
    const lookupById = (id) => apiFetch(`${API}/lookup.php?i=${id}`);
    const randomMeal = () => apiFetch(`${API}/random.php`);

    const shuffle = (arr) => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    const loadFullMeals = async (ids, limit = 8) => {
      const batch = shuffle(ids).slice(0, limit);
      const results = await Promise.all(batch.map(id => lookupById(id).then(d => d.meals?.[0]).catch(() => null)));
      return results.filter(Boolean);
    };

    // ============================================================
    // 4. HELPERS
    // ============================================================
    const getMealIngredients = (meal) => {
      const ingredients = [];
      for (let i = 1; i <= 20; i++) {
        const name = meal[`strIngredient${i}`];
        const measure = meal[`strMeasure${i}`];
        if (name && name.trim()) {
          ingredients.push({ name: name.trim(), measure: measure ? measure.trim() : '' });
        }
      }
      return ingredients;
    };

    const containsExcluded = (meal) => {
      const ingredients = getMealIngredients(meal);
      return ingredients.some(ing =>
        EXCLUDED_WORDS.some(ex => ing.name.toLowerCase().includes(ex.toLowerCase()))
      );
    };

    const isStaple = (name) =>
      STAPLES.some(s => name.toLowerCase().includes(s.toLowerCase()) || s.toLowerCase().includes(name.toLowerCase()));

    const countMissing = (meal, pantry) => {
      const ingredients = getMealIngredients(meal);
      const lowerPantry = pantry.map(p => p.toLowerCase());
      return ingredients.filter(ing => {
        const n = ing.name.toLowerCase();
        if (isStaple(n)) return false;
        return !lowerPantry.some(p => n.includes(p) || p.includes(n));
      });
    };

    const timeAgo = (dateStr) => {
      const date = new Date(dateStr);
      const now = new Date();
      const diffMs = now - date;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      if (diffDays < 7) return `${diffDays} days ago`;
      if (diffDays < 14) return '1 week ago';
      return `${Math.floor(diffDays / 7)} weeks ago`;
    };

    const todayStr = () => new Date().toISOString().slice(0, 10);

    const isYoutube = (url) => url && (url.includes('youtube.com') || url.includes('youtu.be'));

    // ============================================================
    // 5. SMALL COMPONENTS
    // ============================================================
    const Spinner = ({ size = 'md' }) => {
      const sz = size === 'sm' ? 'w-5 h-5' : size === 'lg' ? 'w-12 h-12' : 'w-8 h-8';
      return (
        <div className={`spinner border-4 border-orange-200 border-t-orange-500 rounded-full ${sz}`} />
      );
    };

    const EmptyState = ({ icon, title, subtitle, action }) => (
      <div className="flex flex-col items-center justify-center py-16 px-8 text-center fade-in">
        <div className="text-6xl mb-4">{icon}</div>
        <h3 className="text-lg font-bold text-gray-800 mb-2">{title}</h3>
        {subtitle && <p className="text-sm text-gray-500 mb-6 max-w-xs">{subtitle}</p>}
        {action}
      </div>
    );

    const Tag = ({ label, onRemove, color = 'orange' }) => {
      const colors = {
        orange: 'bg-orange-100 text-orange-700 border-orange-200',
        green: 'bg-green-100 text-green-700 border-green-200',
        gray: 'bg-gray-100 text-gray-700 border-gray-200',
        blue: 'bg-blue-100 text-blue-700 border-blue-200',
      };
      return (
        <span className={`inline-flex items-center gap-1 px-3 py-1 rounded-full text-sm font-medium border ${colors[color]} transition-all`}>
          {label}
          {onRemove && (
            <button onClick={onRemove} className="ml-1 hover:opacity-60 transition-opacity text-xs font-bold leading-none">×</button>
          )}
        </span>
      );
    };

    const StarRating = ({ mealId, ratings, onRate }) => {
      const [hover, setHover] = useState(0);
      const current = ratings[mealId] || 0;
      return (
        <div className="flex gap-1">
          {[1,2,3,4,5].map(star => (
            <button
              key={star}
              onMouseEnter={() => setHover(star)}
              onMouseLeave={() => setHover(0)}
              onClick={() => onRate(mealId, star)}
              className="text-2xl transition-transform hover:scale-110"
            >
              {star <= (hover || current) ? '⭐' : '☆'}
            </button>
          ))}
        </div>
      );
    };

    // ============================================================
    // 6. RECIPE CARD
    // ============================================================
    const RecipeCard = React.memo(({ meal, onOpen, ratings, favourites }) => {
      const isFav = favourites.some(f => f.idMeal === meal.idMeal);
      const rating = ratings[meal.idMeal] || 0;
      const [imgErr, setImgErr] = useState(false);

      return (
        <div
          onClick={() => onOpen(meal)}
          className="bg-white rounded-2xl overflow-hidden shadow-sm border border-orange-100 cursor-pointer hover:shadow-md hover:border-orange-300 transition-all duration-200 active:scale-95 fade-in"
        >
          <div className="relative aspect-square overflow-hidden bg-orange-50">
            {!imgErr ? (
              <img
                src={meal.strMealThumb}
                alt={meal.strMeal}
                className="w-full h-full object-cover"
                onError={() => setImgErr(true)}
                loading="lazy"
              />
            ) : (
              <div className="w-full h-full flex items-center justify-center text-5xl">🍽️</div>
            )}
            {isFav && (
              <div className="absolute top-2 right-2 bg-white rounded-full p-1 shadow">
                <span className="text-sm">❤️</span>
              </div>
            )}
            {meal.missingIngredients !== undefined && (
              <div className={`absolute bottom-0 left-0 right-0 py-1 px-2 text-xs font-semibold text-center ${
                meal.missingIngredients.length === 0
                  ? 'bg-green-500 text-white'
                  : 'bg-orange-500 text-white'
              }`}>
                {meal.missingIngredients.length === 0
                  ? '✓ You have everything!'
                  : `Missing ${meal.missingIngredients.length} ingredient${meal.missingIngredients.length !== 1 ? 's' : ''}`}
              </div>
            )}
          </div>
          <div className="p-3">
            <h3 className="font-bold text-gray-900 text-sm leading-tight line-clamp-2 mb-1">{meal.strMeal}</h3>
            <div className="flex items-center justify-between">
              <div className="flex flex-wrap gap-1">
                {meal.strCategory && <span className="text-xs text-orange-600 font-medium">{meal.strCategory}</span>}
                {meal.strArea && meal.strArea !== 'Unknown' && (
                  <span className="text-xs text-gray-400">· {meal.strArea}</span>
                )}
              </div>
              {rating > 0 && <span className="text-xs">{'⭐'.repeat(rating)}</span>}
            </div>
          </div>
        </div>
      );
    });

    const BookmarkCard = ({ bm, onDelete, onOpen }) => {
      const [imgErr, setImgErr] = useState(false);
      const ytBadge = isYoutube(bm.url);
      return (
        <div className="bg-white rounded-2xl overflow-hidden shadow-sm border border-orange-100 fade-in">
          <div className="relative aspect-video bg-orange-50 overflow-hidden">
            {bm.imageUrl && !imgErr ? (
              <img src={bm.imageUrl} alt={bm.strMeal} className="w-full h-full object-cover" onError={() => setImgErr(true)} loading="lazy" />
            ) : (
              <div className="w-full h-full flex items-center justify-center text-4xl">
                {ytBadge ? '▶️' : '🔗'}
              </div>
            )}
            {ytBadge && (
              <div className="absolute top-2 left-2 bg-red-600 text-white text-xs font-bold px-2 py-0.5 rounded">YouTube</div>
            )}
          </div>
          <div className="p-3">
            <h3 className="font-bold text-gray-900 text-sm leading-tight mb-1">{bm.strMeal}</h3>
            {bm.notes && <p className="text-xs text-gray-500 mb-2 line-clamp-2">{bm.notes}</p>}
            {bm.tags && bm.tags.length > 0 && (
              <div className="flex flex-wrap gap-1 mb-2">
                {bm.tags.map((t,i) => <Tag key={i} label={t} color="gray" />)}
              </div>
            )}
            <div className="flex gap-2 mt-2">
              <a
                href={bm.url}
                target="_blank"
                rel="noopener noreferrer"
                className="flex-1 text-center py-2 rounded-xl bg-orange-500 text-white text-xs font-bold hover:bg-orange-600 transition-colors"
              >
                {ytBadge ? '▶ Watch' : '🔗 Open'}
              </a>
              <button
                onClick={() => onDelete(bm.id)}
                className="px-3 py-2 rounded-xl bg-gray-100 text-gray-500 text-xs hover:bg-red-50 hover:text-red-500 transition-colors"
              >
                🗑
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // 7. RECIPE MODAL
    // ============================================================
    const RecipeModal = ({ meal, onClose, ratings, onRate, favourites, onToggleFav, pantry, onSaveToList, onAteThis }) => {
      const [fullMeal, setFullMeal] = useState(null);
      const [loading, setLoading] = useState(true);
      const scrollRef = useRef();

      useEffect(() => {
        if (!meal) return;
        setLoading(true);
        setFullMeal(null);
        const loadMeal = async () => {
          try {
            if (meal.strInstructions) {
              setFullMeal(meal);
            } else {
              const data = await lookupById(meal.idMeal);
              setFullMeal(data.meals?.[0] || meal);
            }
          } catch {
            setFullMeal(meal);
          } finally {
            setLoading(false);
          }
        };
        loadMeal();
      }, [meal]);

      useEffect(() => {
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = ''; };
      }, []);

      if (!meal) return null;

      const isFav = favourites.some(f => f.idMeal === (fullMeal || meal).idMeal);
      const ingredients = fullMeal ? getMealIngredients(fullMeal) : [];
      const missingSet = fullMeal ? new Set(countMissing(fullMeal, pantry).map(i => i.name.toLowerCase())) : new Set();

      return (
        <div className="fixed inset-0 z-50 flex flex-col bg-black/60" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="flex-1 overflow-hidden flex flex-col max-w-2xl mx-auto w-full bg-[#fff7ed] mt-4 rounded-t-3xl shadow-2xl modal-scroll">
            <div ref={scrollRef} className="flex-1 overflow-y-auto">
              {/* Hero Image */}
              <div className="relative">
                <img
                  src={(fullMeal || meal).strMealThumb}
                  alt={(fullMeal || meal).strMeal}
                  className="w-full aspect-video object-cover"
                  onError={e => { e.target.style.display='none'; }}
                />
                <button
                  onClick={onClose}
                  className="absolute top-4 right-4 bg-black/40 text-white w-10 h-10 rounded-full flex items-center justify-center text-xl hover:bg-black/60 transition-colors"
                >
                  ×
                </button>
              </div>

              <div className="p-5">
                {/* Title + Fav */}
                <div className="flex items-start justify-between gap-3 mb-3">
                  <h2 className="text-2xl font-black text-gray-900 leading-tight flex-1">
                    {(fullMeal || meal).strMeal}
                  </h2>
                  <button
                    onClick={() => onToggleFav(fullMeal || meal)}
                    className="text-3xl transition-transform hover:scale-110 active:scale-90"
                  >
                    {isFav ? '❤️' : '🤍'}
                  </button>
                </div>

                {/* Badges */}
                <div className="flex flex-wrap gap-2 mb-4">
                  {(fullMeal || meal).strCategory && (
                    <span className="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-sm font-semibold">{(fullMeal || meal).strCategory}</span>
                  )}
                  {(fullMeal || meal).strArea && (fullMeal || meal).strArea !== 'Unknown' && (
                    <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-semibold">{(fullMeal || meal).strArea}</span>
                  )}
                </div>

                {/* Star Rating */}
                <div className="mb-5">
                  <p className="text-sm text-gray-500 mb-1 font-medium">Your rating</p>
                  <StarRating mealId={(fullMeal || meal).idMeal} ratings={ratings} onRate={onRate} />
                </div>

                {/* Action buttons */}
                <div className="flex flex-wrap gap-2 mb-5">
                  {fullMeal?.strYoutube && (
                    <a href={fullMeal.strYoutube} target="_blank" rel="noopener noreferrer"
                      className="flex-1 min-w-[140px] flex items-center justify-center gap-2 py-3 rounded-xl bg-red-500 text-white font-bold text-sm hover:bg-red-600 transition-colors">
                      ▶ Watch on YouTube
                    </a>
                  )}
                  {fullMeal?.strSource && (
                    <a href={fullMeal.strSource} target="_blank" rel="noopener noreferrer"
                      className="flex-1 min-w-[140px] flex items-center justify-center gap-2 py-3 rounded-xl bg-blue-500 text-white font-bold text-sm hover:bg-blue-600 transition-colors">
                      🔗 View Full Recipe
                    </a>
                  )}
                </div>

                {loading && (
                  <div className="flex justify-center py-8"><Spinner size="lg" /></div>
                )}

                {!loading && fullMeal && (
                  <>
                    {/* Ingredients */}
                    <div className="mb-5">
                      <h3 className="text-lg font-bold text-gray-900 mb-3">Ingredients</h3>
                      <div className="grid grid-cols-1 gap-2">
                        {ingredients.map((ing, i) => {
                          const inPantry = pantry.some(p =>
                            ing.name.toLowerCase().includes(p.toLowerCase()) || p.toLowerCase().includes(ing.name.toLowerCase())
                          );
                          const missing = missingSet.has(ing.name.toLowerCase());
                          return (
                            <div key={i} className={`flex items-center gap-3 px-3 py-2 rounded-xl text-sm ${
                              inPantry ? 'bg-green-50 border border-green-100' :
                              missing ? 'bg-orange-50 border border-orange-100' :
                              'bg-gray-50 border border-gray-100'
                            }`}>
                              <span className={`text-xs font-bold w-4 text-center ${inPantry ? 'text-green-500' : missing ? 'text-orange-500' : 'text-gray-300'}`}>
                                {inPantry ? '✓' : missing ? '!' : '·'}
                              </span>
                              <span className="font-medium text-gray-800 flex-1">{ing.name}</span>
                              <span className="text-gray-500 text-xs">{ing.measure}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Instructions */}
                    {fullMeal.strInstructions && (
                      <div className="mb-5">
                        <h3 className="text-lg font-bold text-gray-900 mb-3">Instructions</h3>
                        <div className="bg-white rounded-2xl p-4 border border-orange-100">
                          <p className="text-sm text-gray-700 leading-relaxed whitespace-pre-line">{fullMeal.strInstructions}</p>
                        </div>
                      </div>
                    )}
                  </>
                )}

                {/* Bottom actions */}
                <div className="flex flex-col gap-3 pt-2 pb-6">
                  <button
                    onClick={() => fullMeal && onSaveToList(fullMeal)}
                    disabled={!fullMeal}
                    className="w-full py-4 rounded-2xl bg-orange-500 text-white font-black text-base hover:bg-orange-600 transition-colors disabled:opacity-50 shadow-lg shadow-orange-200 active:scale-95"
                  >
                    🛒 Save to Shopping List
                  </button>
                  <button
                    onClick={() => onAteThis(fullMeal || meal)}
                    className="w-full py-4 rounded-2xl bg-green-500 text-white font-black text-base hover:bg-green-600 transition-colors shadow-lg shadow-green-200 active:scale-95"
                  >
                    ✅ We Ate This!
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ============================================================
    // 8. SHOPPING LIST GENERATOR MODAL
    // ============================================================
    const ShoppingListGenerator = ({ meal, pantry, onSave, onBack }) => {
      const ingredients = getMealIngredients(meal);
      const [checked, setChecked] = useState(() => {
        const initial = {};
        ingredients.forEach(ing => {
          const inPantry = pantry.some(p =>
            ing.name.toLowerCase().includes(p.toLowerCase()) || p.toLowerCase().includes(ing.name.toLowerCase())
          );
          const staple = isStaple(ing.name);
          initial[ing.name] = inPantry || staple;
        });
        return initial;
      });

      useEffect(() => {
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = ''; };
      }, []);

      const toggle = (name) => setChecked(prev => ({ ...prev, [name]: !prev[name] }));

      const handleSave = () => {
        const items = ingredients.map(ing => ({
          name: ing.name,
          measure: ing.measure,
          checked: !!checked[ing.name],
        }));
        onSave({ mealName: meal.strMeal, items });
      };

      const needed = ingredients.filter(ing => !checked[ing.name]);

      return (
        <div className="fixed inset-0 z-60 flex flex-col bg-black/60">
          <div className="flex-1 overflow-hidden flex flex-col max-w-2xl mx-auto w-full bg-[#fff7ed] mt-4 rounded-t-3xl shadow-2xl">
            <div className="p-5 border-b border-orange-100 bg-white rounded-t-3xl">
              <button onClick={onBack} className="text-orange-500 font-semibold text-sm mb-2">← Back to Recipe</button>
              <h2 className="text-xl font-black text-gray-900">What do you need for</h2>
              <p className="text-orange-600 font-bold">{meal.strMeal}?</p>
              <p className="text-xs text-gray-500 mt-1">Tick what you already have. We'll add the rest to your list.</p>
            </div>
            <div className="flex-1 overflow-y-auto p-5 space-y-2">
              {ingredients.map((ing, i) => (
                <label key={i} className={`flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition-all ${
                  checked[ing.name]

      const loadMeals = useCallback(async () => {
        setLoading(true);
        setMeals([null, null]);
        try {
          let found = [];
          let attempts = 0;
          while (found.length < 2 && attempts < 20) {
            const results = await Promise.all([randomMeal(), randomMeal()]);
            const candidates = results.map(r => r.meals?.[0]).filter(Boolean);
            const valid = candidates.filter(m => !containsExcluded(m) && isSavoury(m));
            found = [...found, ...valid].slice(0, 2);
            attempts++;
          }
          setMeals(found.slice(0, 2));
        } catch {
          setMeals([null, null]);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { loadMeals(); }, [loadMeals]);
      useEffect(() => {
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = ''; };
      }, []);

    const WhatsInPage = ({ pantry, onUpdatePantry, ratings, favourites, onOpenMeal }) => {
      const [input, setInput] = useState('');
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [searched, setSearched] = useState(false);
      const [error, setError] = useState('');
      const inputRef = useRef();

      const addIngredient = () => {
        const val = input.trim();
        if (!val) return;
        if (!pantry.includes(val.toLowerCase())) {
          onUpdatePantry([...pantry, val.toLowerCase()]);
        }
        setInput('');
        inputRef.current?.focus();
      };

      const removeIngredient = (ing) => onUpdatePantry(pantry.filter(p => p !== ing));

      const findRecipes = async () => {
        if (pantry.length === 0) { setError('Add some ingredients first!'); return; }
        setError('');
        setLoading(true);
        setSearched(true);
        try {
          const primary = pantry[0];
          const data = await filterByIngredient(primary);
          if (!data.meals) { setResults([]); setLoading(false); return; }
          const ids = data.meals.map(m => m.idMeal);
          const meals = await loadFullMeals(ids, 12);
          const filtered = meals.filter(m => !containsExcluded(m));
          const withMissing = filtered.map(m => ({
            ...m,
            missingIngredients: countMissing(m, pantry),
          }));
          withMissing.sort((a, b) => a.missingIngredients.length - b.missingIngredients.length);
          setResults(withMissing);
        } catch {
          setError('Failed to fetch recipes. Please try again.');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="px-4 pt-6 pb-safe">
          <h2 className="text-2xl font-black text-gray-900 mb-1">🥗 What's In Your Kitchen?</h2>
          <p className="text-sm text-gray-500 mb-5">Add ingredients and find recipes you can make tonight.</p>

          {/* Add ingredient */}
          <div className="flex gap-2 mb-4">
            <input
              ref={inputRef}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && addIngredient()}
              placeholder="e.g. chicken, tomatoes, rice..."
              className="flex-1 px-4 py-3 rounded-2xl border border-orange-200 bg-white text-sm focus:outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
            />
            <button
              onClick={addIngredient}
              className="px-5 py-3 rounded-2xl bg-orange-500 text-white font-bold hover:bg-orange-600 transition-colors"
            >
              +
            </button>
          </div>

          {/* Pantry tags */}
          {pantry.length > 0 && (
            <div className="mb-4">
              <div className="flex items-center justify-between mb-2">
                <p className="text-sm font-semibold text-gray-700">Your pantry ({pantry.length})</p>
                <button onClick={() => onUpdatePantry([])} className="text-xs text-red-400 hover:text-red-600">Clear all</button>
              </div>
              <div className="flex flex-wrap gap-2">
                {pantry.map(ing => (
                  <Tag key={ing} label={ing} onRemove={() => removeIngredient(ing)} color="orange" />
                ))}
              </div>
            </div>
          )}

          {error && <p className="text-red-500 text-sm mb-3 font-medium">{error}</p>}

          <button
            onClick={findRecipes}
            disabled={loading || pantry.length === 0}
            className="w-full py-4 rounded-2xl bg-orange-500 text-white font-black text-base hover:bg-orange-600 transition-colors shadow-lg shadow-orange-200 disabled:opacity-50 mb-6"
          >
            {loading ? 'Finding Recipes...' : '🔍 Find Recipes'}
          </button>

          {loading && (
            <div className="flex flex-col items-center py-8 gap-3">
              <Spinner size="lg" />
              <p className="text-gray-500 font-medium">Checking your pantry...</p>
            </div>
          )}

          {!loading && searched && results.length === 0 && (
            <EmptyState icon="🤷" title="No recipes found" subtitle="Try different ingredients or fewer filters." />
          )}

          {!loading && results.length > 0 && (
            <>
              <p className="text-sm text-gray-500 mb-3 font-medium">Found {results.length} recipes · sorted by least missing</p>
              <div className="grid grid-cols-2 gap-3">
                {results.map(meal => (

                    onOpen={onOpenMeal}
                    ratings={ratings}
                    favourites={favourites}
                  />
                ))}
              </div>
            </>
          )}
        </div>
      );
    };

    const FancyPage = ({ ratings, favourites, onOpenMeal }) => {
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [activeTag, setActiveTag] = useState(null);
      const [error, setError] = useState('');

      const doSearch = useCallback(async (type, value, tagLabel) => {
        setLoading(true);
        setError('');
        setResults([]);
        setActiveTag(tagLabel || null);
        try {
          let data;
          if (type === 'category') data = await filterByCategory(value);
          else if (type === 'area') data = await filterByArea(value);
          else if (type === 'ingredient') data = await filterByIngredient(value);
          else data = await searchByName(value);

          if (!data.meals) { setResults([]); setLoading(false); return; }

          let meals;
          if (data.meals[0]?.strInstructions) {
            meals = data.meals.filter(m => !containsExcluded(m)).slice(0, 16);
          } else {
            const ids = data.meals.map(m => m.idMeal);
            const full = await loadFullMeals(ids, 16);
            meals = full.filter(m => !containsExcluded(m));
          }
          setResults(meals);
        } catch {
          setError('Failed to fetch. Try again.');
        } finally {
          setLoading(false);
        }
      }, []);

      const handleSearch = (e) => {
        e?.preventDefault();
        const q = query.trim();
        if (!q) return;
        const areaNames = ['Italian','Mexican','Indian','Chinese','Japanese','Thai','American','British','French','Greek','Spanish','Turkish','Moroccan','Vietnamese'];
        const catNames = ['Pasta','Beef','Seafood','Chicken','Dessert','Vegetarian','Breakfast','Pork','Side','Starter','Vegan','Miscellaneous'];
        const lower = q.toLowerCase();
        const matchedArea = areaNames.find(a => a.toLowerCase() === lower);
        const matchedCat = catNames.find(c => c.toLowerCase() === lower);
        if (matchedArea) doSearch('area', matchedArea, null);
        else if (matchedCat) doSearch('category', matchedCat, null);
        else doSearch('name', q, null);
      };

      return (
        <div className="px-4 pt-6 pb-safe">
          <h2 className="text-2xl font-black text-gray-900 mb-1">✨ Fancy Something?</h2>
          <p className="text-sm text-gray-500 mb-4">Search for anything or pick a mood.</p>

          {/* Search bar */}
          <form onSubmit={handleSearch} className="flex gap-2 mb-5">
            <input
              value={query}
              onChange={e => setQuery(e.target.value)}
              placeholder="pasta, Chinese, something quick..."
              className="flex-1 px-4 py-3 rounded-2xl border border-orange-200 bg-white text-sm focus:outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
            />
            <button
              type="submit"
              className="px-5 py-3 rounded-2xl bg-orange-500 text-white font-bold hover:bg-orange-600 transition-colors"
            >
              🔍
            </button>
          </form>

          {/* Mood tags */}
          <div className="mb-5">
            <p className="text-sm font-semibold text-gray-700 mb-3">What are you feeling?</p>
            <div className="flex flex-wrap gap-2">
              {MOOD_TAGS.map(tag => (
                <button
                  key={tag.label}
                  onClick={() => { setQuery(''); doSearch(tag.type, tag.value, tag.label); }}
                  className={`px-3 py-2 rounded-2xl text-sm font-semibold border transition-all active:scale-95 ${
                    activeTag === tag.label
                      ? 'bg-orange-500 text-white border-orange-500 shadow-md shadow-orange-200'
                      : 'bg-white text-gray-700 border-orange-100 hover:border-orange-300'
                  }`}
                >
                  {tag.label}
                </button>
              ))}
            </div>
          </div>

          {error && <p className="text-red-500 text-sm mb-3">{error}</p>}

          {loading && (
            <div className="flex flex-col items-center py-8 gap-3">
              <Spinner size="lg" />
              <p className="text-gray-500 font-medium">Finding recipes...</p>
            </div>
          )}

          {!loading && results.length === 0 && !activeTag && !query && (
            <div className="bg-white rounded-2xl p-6 border border-orange-100 text-center">
              <p className="text-4xl mb-3">👆</p>
              <p className="text-gray-500 text-sm">Tap a mood tag or search above to find your perfect dinner</p>
            </div>
          )}

          {!loading && results.length === 0 && (activeTag || query) && (
            <EmptyState icon="😕" title="Nothing found" subtitle="Try a different search or mood tag." />
          )}

          {!loading && results.length > 0 && (
            <>
              <p className="text-sm text-gray-500 mb-3 font-medium">{results.length} recipes found{activeTag ? ` for "${activeTag}"` : ''}</p>
              <div className="grid grid-cols-2 gap-3">
                {results.map(meal => (
                  <RecipeCard
                    key={meal.idMeal}
                    meal={meal}
                    onOpen={onOpenMeal}
                    ratings={ratings}
                    favourites={favourites}
                  />
                ))}
              </div>
            </>
          )}
        </div>
      );
    };

                    onChange={e => setForm(f => ({...f, notes: e.target.value}))}
                    placeholder={fromScan ? 'Scanned recipe text will appear here...' : 'e.g. Use pancetta, add extra parmesan...'}
                    rows={fromScan ? 10 : 3}
                    className="w-full px-4 py-3 rounded-xl border border-orange-200 bg-white text-sm focus:outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100 resize-none"
                  />
                </div>
                <div>
                  <label className="block text-sm font-semibold text-gray-700 mb-1">Tags <span className="text-gray-400 font-normal">(comma-separated)</span></label>
                  <input
                    value={form.tags}
                    onChange={e => setForm(f => ({...f, tags: e.target.value}))}
                    placeholder="Italian, quick, Jamie Oliver"
                    className="w-full px-4 py-3 rounded-xl border border-orange-200 bg-white text-sm focus:outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
                  />
                </div>
                <button
                  type="submit"
                  className="w-full py-4 rounded-2xl bg-orange-500 text-white font-black text-base hover:bg-orange-600 transition-colors shadow-lg shadow-orange-200"
                >
                  💾 Save Recipe
                </button>
              </form>
            </div>
          </div>
        </div>
      );
    };

    const ScanRecipeModal = ({ onSave, onClose }) => {
      const [step, setStep] = useState('capture');
      const [imagePreview, setImagePreview] = useState(null);
      const [imageFile, setImageFile] = useState(null);
      const [progress, setProgress] = useState(0);
      const [prefill, setPrefill] = useState(null);
      const [scanError, setScanError] = useState('');
      const fileInputRef = useRef(null);

      useEffect(() => {
        document.body.style.overflow = 'hidden';
        return () => { document.body.style.overflow = ''; };
      }, []);

      const handleImageSelect = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setImageFile(file);
        const reader = new FileReader();
        reader.onload = ev => setImagePreview(ev.target.result);
        reader.readAsDataURL(file);
        setStep('preview');
        setScanError('');
      };

      const handleScan = async () => {
        if (!imageFile) return;
        setStep('scanning');
        setProgress(0);
        setScanError('');
        try {
          const { data: { text } } = await Tesseract.recognize(imageFile, 'eng', {
            logger: m => {
              if (m.status === 'recognizing text') setProgress(Math.round(m.progress * 100));
            },
          });
          const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
          const title = lines.slice(0, 3).find(l => l.length > 3 && l.length < 80) || '';
          const bodyText = lines.slice(title ? 1 : 0).join('\n');
          setPrefill({ strMeal: title, notes: bodyText, tags: 'cookbook' });
          setStep('review');
        } catch {
          setScanError('Scanning failed. Make sure the photo is clear and well-lit, then try again.');
          setStep('preview');
        }
      };

      if (step === 'review' && prefill) {
        return <AddBookmarkModal onSave={onSave} onClose={onClose} prefill={prefill} fromScan={true} />;
      }

      return (
        <div className="fixed inset-0 z-50 flex flex-col bg-black/60">
          <div className="flex-1 overflow-hidden flex flex-col max-w-2xl mx-auto w-full bg-[#fff7ed] mt-4 rounded-t-3xl shadow-2xl">
            <div className="flex items-center justify-between p-5 border-b border-orange-100 bg-white rounded-t-3xl">
              <div>
                <h2 className="text-xl font-black text-gray-900">📷 Scan Cookbook Recipe</h2>
                <p className="text-sm text-gray-500">Point your camera at a recipe page</p>
              </div>
              <button onClick={onClose} className="w-10 h-10 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center text-xl">×</button>
            </div>

            <div className="flex-1 overflow-y-auto p-5">
              {step === 'capture' && (
                <div className="flex flex-col items-center justify-center min-h-64 gap-6 py-8">
                  <div className="text-7xl">📚</div>
                  <div className="text-center">
                    <h3 className="font-bold text-lg text-gray-800 mb-2">Photograph your recipe</h3>
                    <p className="text-sm text-gray-500 max-w-xs">Take a clear, well-lit photo of a cookbook page. The sharper the photo, the better the result.</p>
                  </div>
                  <input ref={fileInputRef} type="file" accept="image/*" capture="environment" onChange={handleImageSelect} className="hidden" />
                  <button
                    onClick={() => fileInputRef.current?.click()}
                    className="w-full py-4 rounded-2xl bg-orange-500 text-white font-black text-base hover:bg-orange-600 transition-colors shadow-lg shadow-orange-200 active:scale-95"
                  >
                    📷 Take Photo / Choose Image
                  </button>
                </div>
              )}

              {step === 'preview' && imagePreview && (
                <div className="flex flex-col gap-4">
                  <img src={imagePreview} alt="Recipe preview" className="w-full rounded-2xl object-contain max-h-72 bg-gray-100" />
                  {scanError && <p className="text-red-500 text-sm bg-red-50 p-3 rounded-xl">{scanError}</p>}
                  <p className="text-sm text-center text-gray-500">Make sure the text is sharp and the whole recipe is visible.</p>
                  <div className="grid grid-cols-2 gap-3">
                    <button
                      onClick={() => { setStep('capture'); setImagePreview(null); setImageFile(null); }}
                      className="py-4 rounded-2xl bg-gray-100 text-gray-700 font-bold hover:bg-gray-200 active:scale-95 transition-all"
                    >
                      ↩ Retake
                    </button>
                    <button
                      onClick={handleScan}
                      className="py-4 rounded-2xl bg-orange-500 text-white font-black hover:bg-orange-600 active:scale-95 transition-all shadow-lg shadow-orange-200"
                    >
                      🔍 Scan It
                    </button>
                  </div>
                </div>
              )}

              {step === 'scanning' && (
                <div className="flex flex-col items-center justify-center min-h-64 gap-6 py-8">
                  <Spinner size="lg" />
                  <div className="w-full bg-orange-100 rounded-full h-3 overflow-hidden">
                    <div className="bg-orange-500 h-3 rounded-full transition-all duration-300" style={{ width: `${progress}%` }} />
                  </div>
                  <div className="text-center">
                    <p className="font-bold text-gray-800">Reading your recipe...</p>
                    <p className="text-sm text-gray-500 mt-1">{progress}% complete</p>
                    <p className="text-xs text-gray-400 mt-3">This can take up to a minute depending on the photo size.</p>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const SavedPage = ({ favourites, onToggleFav, bookmarks, onAddBookmark, onDeleteBookmark, ratings, onOpenMeal }) => {
      const [tab, setTab] = useState('favs');
      const [showAddForm, setShowAddForm] = useState(false);
      const [showScanForm, setShowScanForm] = useState(false);

      const handleSaveBookmark = (bm) => {
        onAddBookmark(bm);
        setShowAddForm(false);
        setShowScanForm(false);
      };

      return (
        <div className="px-4 pt-6 pb-safe">
          <h2 className="text-2xl font-black text-gray-900 mb-4">🔖 Saved</h2>

          {/* Tabs */}
          <div className="flex bg-orange-50 rounded-2xl p-1 mb-6 border border-orange-100">
            <button
              onClick={() => setTab('favs')}
              className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${
                tab === 'favs' ? 'bg-white text-orange-600 shadow-sm' : 'text-gray-500'
              }`}
            >
              ❤️ Favourites ({favourites.length})
            </button>
            <button
              onClick={() => setTab('bookmarks')}
              className={`flex-1 py-2.5 rounded-xl text-sm font-bold transition-all ${
                tab === 'bookmarks' ? 'bg-white text-orange-600 shadow-sm' : 'text-gray-500'
              }`}
            >
              🔖 Bookmarks ({bookmarks.length})
            </button>
          </div>

          {tab === 'favs' && (
            <>
              {favourites.length === 0 ? (
                <EmptyState
                  icon="🤍"
                  title="No favourites yet"
                  subtitle="Tap the heart on any recipe to save it here."
                />
              ) : (
                <div className="grid grid-cols-2 gap-3">
                  {favourites.map(meal => (
                    <RecipeCard
                      key={meal.idMeal}
                      meal={meal}
                      onOpen={onOpenMeal}
                      ratings={ratings}
                      favourites={favourites}
                    />
                  ))}
                </div>
              )}
            </>
          )}

          {tab === 'bookmarks' && (
            <>
              <div className="grid grid-cols-2 gap-3 mb-5">
                <button
                  onClick={() => setShowAddForm(true)}
                  className="py-4 rounded-2xl bg-orange-500 text-white font-black text-sm hover:bg-orange-600 transition-colors shadow-lg shadow-orange-200 active:scale-95"
                >
                  🔗 Add from URL
                </button>
                <button
                  onClick={() => setShowScanForm(true)}
                  className="py-4 rounded-2xl bg-gray-900 text-white font-black text-sm hover:bg-gray-800 transition-colors shadow-lg shadow-gray-300 active:scale-95"
                >
                  📷 Scan Cookbook
                </button>
              </div>
              {bookmarks.length === 0 ? (
                <EmptyState
                  icon="🔗"
                  title="No bookmarks yet"
                  subtitle="Save recipes from any website, YouTube video, or photograph a cookbook page."
                />
              ) : (
                <div className="grid grid-cols-2 gap-3">
                  {bookmarks.map(bm => (
                    <BookmarkCard
                      key={bm.id}
                      bm={bm}
                      onDelete={onDeleteBookmark}
                      onOpen={onOpenMeal}
                    />
                  ))}
                </div>
              )}
            </>
          )}

          {showAddForm && (
            <AddBookmarkModal onSave={handleSaveBookmark} onClose={() => setShowAddForm(false)} />
          )}
          {showScanForm && (
            <ScanRecipeModal onSave={handleSaveBookmark} onClose={() => setShowScanForm(false)} />
          )}
        </div>
      );
    };

    // ============================================================
    // 14. SHOPPING LIST PAGE
    // ============================================================
    const ShoppingPage = ({ shoppingList, onUpdate, onClear }) => {
      const [newItem, setNewItem] = useState('');
      const inputRef = useRef(null);

      const toggleItem = (idx) => {
        const newItems = shoppingList.items.map((it, i) => i === idx ? { ...it, checked: !it.checked } : it);
        onUpdate({ ...shoppingList, items: newItems });
      };

      const addItem = () => {
        const name = newItem.trim();
        if (!name) return;
        const entry = { name, measure: '', checked: false };
        if (shoppingList) {
          onUpdate({ ...shoppingList, items: [...shoppingList.items, entry] });
        } else {
          onUpdate({ mealName: 'My List', items: [entry] });
        }
        setNewItem('');
        inputRef.current?.focus();
      };

      const handleKeyDown = (e) => { if (e.key === 'Enter') { e.preventDefault(); addItem(); } };

      const items = shoppingList?.items || [];
      const checkedCount = items.filter(i => i.checked).length;
      const total = items.length;
      const pct = total > 0 ? Math.round((checkedCount / total) * 100) : 0;
      const unchecked = items.filter(i => !i.checked);
      const checkedItems = items.filter(i => i.checked);

      return (
        <div className="px-4 pt-6 pb-safe">
          <div className="flex items-start justify-between mb-4">
            <div>
              <h2 className="text-2xl font-black text-gray-900">🛒 Shopping List</h2>
              {shoppingList?.mealName && (
                <p className="text-sm text-orange-600 font-semibold mt-0.5">For: {shoppingList.mealName}</p>
              )}
            </div>
            {shoppingList && (
              <button onClick={onClear} className="text-xs text-red-400 hover:text-red-600 font-medium mt-1 px-2 py-1">Clear all</button>
            )}
          </div>

          {/* Manual add — always visible */}
          <div className="flex gap-2 mb-5">
            <input
              ref={inputRef}
              value={newItem}
              onChange={e => setNewItem(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="Add an item manually..."
              className="flex-1 px-4 py-3 rounded-xl border border-orange-200 bg-white text-sm focus:outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100"
            />
            <button
              onClick={addItem}
              className="px-5 py-3 rounded-xl bg-orange-500 text-white font-black text-lg hover:bg-orange-600 active:scale-95 transition-all shadow-md shadow-orange-200"
            >
              +
            </button>
          </div>

          {total === 0 ? (
            <EmptyState
              icon="🛒"
              title="Your list is empty"
              subtitle={'Generate a list from any recipe using "I\'m Making This!", or add items above.'}
            />
          ) : (
            <>
              {/* Progress */}
              <div className="mb-5">
                <div className="flex items-center justify-between text-sm mb-1.5">
                  <span className="text-gray-600 font-medium">{checkedCount} of {total} items ticked</span>
                  <span className={`font-bold ${pct === 100 ? 'text-green-600' : 'text-orange-500'}`}>{pct}%</span>
                </div>
                <div className="h-3 bg-orange-100 rounded-full overflow-hidden">
                  <div className="h-full bg-orange-500 rounded-full transition-all duration-500" style={{ width: `${pct}%` }} />
                </div>
                {pct === 100 && (
                  <p className="text-center text-green-600 font-bold text-sm mt-2">🎉 You've got everything!</p>
                )}
              </div>

              {/* Still need */}
              {unchecked.length > 0 && (
                <div className="mb-4">
                  <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Still need ({unchecked.length})</p>
                  <div className="space-y-2">
                    {items.map((item, idx) => !item.checked && (
                      <label key={idx} className="flex items-center gap-3 p-4 bg-white rounded-2xl border border-orange-100 shadow-sm cursor-pointer hover:border-orange-300 transition-all active:scale-95">
                        <input type="checkbox" checked={false} onChange={() => toggleItem(idx)} className="w-5 h-5 accent-green-500" />
                        <span className="flex-1 font-semibold text-gray-800">{item.name}</span>
                        {item.measure && <span className="text-sm text-gray-400">{item.measure}</span>}
                      </label>
                    ))}
                  </div>
                </div>
              )}

              {/* In basket */}
              {checkedItems.length > 0 && (
                <div>
                  <p className="text-xs font-bold text-gray-400 uppercase tracking-wide mb-2">✓ Already have / in basket ({checkedItems.length})</p>
                  <div className="space-y-2">
                    {items.map((item, idx) => item.checked && (
                      <label key={idx} className="flex items-center gap-3 p-4 bg-green-50 rounded-2xl border border-green-100 cursor-pointer hover:bg-green-100 transition-all active:scale-95">
                        <input type="checkbox" checked={true} onChange={() => toggleItem(idx)} className="w-5 h-5 accent-green-500" />
                        <span className="flex-1 text-green-700 line-through">{item.name}</span>
                        {item.measure && <span className="text-sm text-green-400">{item.measure}</span>}
                      </label>
                    ))}
                  </div>
                </div>
              )}

              <button onClick={onClear} className="w-full mt-6 py-4 rounded-2xl bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-colors">
                🗑 Clear List
              </button>
            </>
          )}
        </div>
      );
    };

    // ============================================================
    // 15. APP
    // ============================================================
    const NAV_ITEMS = [
      { id: 'home',     label: 'Home',     icon: '🏠' },
      { id: 'whatsin',  label: "What's In", icon: '🥗' },
      { id: 'fancy',    label: 'Fancy?',   icon: '✨' },
      { id: 'saved',    label: 'Saved',    icon: '🔖' },
      { id: 'shopping', label: 'Shopping', icon: '🛒' },
    ];

    function App() {
      const [tab, setTab] = useState('home');
      const [pantry, setPantry] = useState(() => load(KEYS.pantry, []));
      const [favourites, setFavourites] = useState(() => load(KEYS.favourites, []));
      const [ratings, setRatings] = useState(() => load(KEYS.ratings, {}));
      const [bookmarks, setBookmarks] = useState(() => load(KEYS.bookmarks, []));
      const [recentlyEaten, setRecentlyEaten] = useState(() => load(KEYS.recentlyEaten, []));
      const [shoppingList, setShoppingList] = useState(() => load(KEYS.shoppingList, null));

      const [openMeal, setOpenMeal] = useState(null);
      const [showFaceOff, setShowFaceOff] = useState(false);
      const [spinLoading, setSpinLoading] = useState(false);

      // Persist
      useEffect(() => { save(KEYS.pantry, pantry); }, [pantry]);
      useEffect(() => { save(KEYS.favourites, favourites); }, [favourites]);
      useEffect(() => { save(KEYS.ratings, ratings); }, [ratings]);
      useEffect(() => { save(KEYS.bookmarks, bookmarks); }, [bookmarks]);
      useEffect(() => { save(KEYS.recentlyEaten, recentlyEaten); }, [recentlyEaten]);
      useEffect(() => { save(KEYS.shoppingList, shoppingList); }, [shoppingList]);

      const handleUpdatePantry = useCallback((p) => setPantry(p), []);

      const handleToggleFav = useCallback((meal) => {
        setFavourites(prev => {
          if (prev.some(f => f.idMeal === meal.idMeal)) {
            return prev.filter(f => f.idMeal !== meal.idMeal);
          }
          return [meal, ...prev];
        });
      }, []);

      const handleRate = useCallback((mealId, stars) => {
        setRatings(prev => ({ ...prev, [mealId]: stars }));
      }, []);

      const handleOpenMeal = useCallback((meal) => {
        setOpenMeal(meal);
        setShowShoppingGen(false);
      }, []);

      const handleCloseModal = useCallback(() => {
        setOpenMeal(null);
      }, []);

      const handleSaveToList = useCallback((meal) => {
        const ingredients = getMealIngredients(meal);
        const items = ingredients.map(ing => ({
          name: ing.name,
          measure: ing.measure,
          checked: false,
        }));
        setShoppingList({ mealName: meal.strMeal, items });
        setOpenMeal(null);
        setTab('shopping');
      }, []);

      const handleAteThis = useCallback((meal) => {
        const entry = {
          mealName: meal.strMeal,
          mealThumb: meal.strMealThumb,
          date: todayStr(),
          mealId: meal.idMeal || null,
        };
        setRecentlyEaten(prev => [entry, ...prev.filter(e => e.mealName !== meal.strMeal)].slice(0, 20));
        setOpenMeal(null);
      }, []);

      const handleShoppingUpdate = useCallback((list) => setShoppingList(list), []);
      const handleShoppingClear = useCallback(() => setShoppingList(null), []);

      const handleAddBookmark = useCallback((bm) => {
        setBookmarks(prev => [bm, ...prev]);
      }, []);

      const handleDeleteBookmark = useCallback((id) => {
        setBookmarks(prev => prev.filter(b => b.id !== id));
      }, []);

      const handleSpinWheel = useCallback(async () => {
        if (spinLoading) return;
        setSpinLoading(true);
        try {
          let meal = null;
          let attempts = 0;
          while (!meal && attempts < 15) {
            const data = await randomMeal();
            const candidate = data.meals?.[0];
            if (candidate && !containsExcluded(candidate) && isSavoury(candidate)) {
              meal = candidate;
            }
            attempts++;
          }
          if (meal) setOpenMeal(meal);
        } catch {
          // silently fail
        } finally {
          setSpinLoading(false);
        }
      }, [spinLoading]);

      const handleDeleteRecentlyEaten = useCallback((idx) => {
        setRecentlyEaten(prev => prev.filter((_, i) => i !== idx));
      }, []);

      const handleFaceOffPick = useCallback((meal) => {
        setShowFaceOff(false);
        setOpenMeal(meal);
      }, []);

      const shoppingBadge = shoppingList && shoppingList.items && shoppingList.items.some(i => !i.checked);

      return (
        <div className="min-h-screen bg-[#fff7ed]">
          {/* Spin loading overlay */}
          {spinLoading && (
            <div className="fixed inset-0 z-40 bg-black/50 flex flex-col items-center justify-center gap-4">
              <Spinner size="lg" />
              <p className="text-white font-bold text-lg">Spinning the wheel...</p>
            </div>
          )}

          {/* Main content */}
          <div className="max-w-2xl mx-auto">
            {tab === 'home' && (
              <HomePage
                onSpinWheel={handleSpinWheel}
                onFaceOff={() => setShowFaceOff(true)}
                recentlyEaten={recentlyEaten}
                onDeleteRecentlyEaten={handleDeleteRecentlyEaten}
                favourites={favourites}
                onOpenMeal={handleOpenMeal}
              />
            )}
            {tab === 'whatsin' && (
              <WhatsInPage
                pantry={pantry}
                onUpdatePantry={handleUpdatePantry}
                ratings={ratings}
                favourites={favourites}
                onOpenMeal={handleOpenMeal}
              />
            )}
            {tab === 'fancy' && (
              <FancyPage
                ratings={ratings}
                favourites={favourites}
                onOpenMeal={handleOpenMeal}
              />
            )}
            {tab === 'saved' && (
              <SavedPage
                favourites={favourites}
                onToggleFav={handleToggleFav}
                bookmarks={bookmarks}
                onAddBookmark={handleAddBookmark}
                onDeleteBookmark={handleDeleteBookmark}
                ratings={ratings}
                onOpenMeal={handleOpenMeal}
              />
            )}
            {tab === 'shopping' && (
              <ShoppingPage
                shoppingList={shoppingList}
                onUpdate={handleShoppingUpdate}
                onClear={handleShoppingClear}
              />
            )}
          </div>

          {/* Bottom Navigation */}
          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-orange-100 shadow-lg bottom-nav z-30">
            <div className="max-w-2xl mx-auto flex">
              {NAV_ITEMS.map(item => {
                const isActive = tab === item.id;
                const hasBadge = item.id === 'shopping' && shoppingBadge;
                return (
                  <button
                    key={item.id}
                    onClick={() => setTab(item.id)}
                    className={`flex-1 flex flex-col items-center justify-center py-3 gap-0.5 transition-all ${
                      isActive ? 'text-orange-500' : 'text-gray-400 hover:text-gray-600'
                    }`}
                  >
                    <div className="relative">
                      <span className="text-2xl leading-none">{item.icon}</span>
                      {hasBadge && (
                        <span className="absolute -top-1 -right-1 w-3 h-3 bg-orange-500 rounded-full border-2 border-white" />
                      )}
                    </div>
                    <span className={`text-[10px] font-semibold ${isActive ? 'text-orange-500' : 'text-gray-400'}`}>
                      {item.label}
                    </span>
                    {isActive && <div className="absolute bottom-0 w-8 h-0.5 bg-orange-500 rounded-full" style={{position:'relative',marginTop:2}} />}
                  </button>
                );
              })}
            </div>
          </nav>

          {/* Recipe Modal */}
          {openMeal && (
            <RecipeModal
              meal={openMeal}
              onClose={handleCloseModal}
              ratings={ratings}
              onRate={handleRate}
              favourites={favourites}
              onToggleFav={handleToggleFav}
              pantry={pantry}
              onSaveToList={handleSaveToList}
              onAteThis={handleAteThis}
            />
          )}

          {/* Face Off Modal */}
          {showFaceOff && (
            <FaceOffModal
              onClose={() => setShowFaceOff(false)}
              onPick={handleFaceOffPick}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
